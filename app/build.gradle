import java.util.Properties

plugins {
    id "com.android.application"
}

def signingProps = new Properties()
def signingPropsFile = rootProject.file("key.properties")
if (signingPropsFile.exists()) {
    signingPropsFile.withInputStream { stream ->
        signingProps.load(stream)
    }
}

android {
    namespace "com.example.globalpeq"
    compileSdk 35

    defaultConfig {
        applicationId "com.example.globalpeq"
        minSdk 28
        targetSdk 35
        versionCode 1
        versionName "0.1"
    }

    signingConfigs {
        release {
            if (!signingProps.isEmpty()) {
                storeFile rootProject.file(signingProps["storeFile"])
                storePassword signingProps["storePassword"]
                keyAlias signingProps["keyAlias"]
                keyPassword signingProps["keyPassword"]
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation files(
            rootProject.file("../_tmp_shizuku_api/classes.jar"),
            rootProject.file("../_tmp_shizuku_provider/classes.jar")
    )
}
