buildscript {
    dependencies {
        classpath files(fileTree(
                dir: new File(System.getProperty("user.home"), ".gradle/caches/modules-2/files-2.1"),
                include: ["**/*.jar"]
        ))
    }
}

import com.android.build.gradle.AppPlugin

apply plugin: AppPlugin

android {
    namespace "com.example.globalpeq"
    compileSdk 35

    defaultConfig {
        applicationId "com.example.globalpeq"
        minSdk 28
        targetSdk 35
        versionCode 1
        versionName "0.1"
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation files(
            "../_tmp_shizuku_api/classes.jar",
            "../_tmp_shizuku_provider/classes.jar"
    )
}
