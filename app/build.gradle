plugins {
    id "com.android.application"
}

android {
    namespace "com.example.globalpeq"
    compileSdk 35

    defaultConfig {
        applicationId "com.example.globalpeq"
        minSdk 28
        targetSdk 35
        versionCode 1
        versionName "0.1"
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            resValue "string", "app_name", "Global PEQ Debug"
        }
        release {
            resValue "string", "app_name", "Global PEQ"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "dev.rikka.shizuku:api:13.1.5"
    implementation "dev.rikka.shizuku:provider:13.1.5"
}
